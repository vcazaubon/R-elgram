<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover lets us use the safe-area insets under the notch -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Réelgram</title>

  <!-- PWA -->
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- iOS standalone + status bar -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Réelgram" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-180.png" />

  <!-- Runtime config (window.__ENV__) loaded BEFORE the bundle -->
  <script src="/env.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
