services:
  api:
    build: ./backend
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      MEDIA_TOKEN_SECRET: ${MEDIA_TOKEN_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      DATA_DIR: /data
      IG_COOKIES_FILE: ${IG_COOKIES_FILE:-}
      MAX_VIDEO_MB: ${MAX_VIDEO_MB:-300}
    volumes:
      - reelgram-media:/data
      # Instagram cookies (Netscape cookies.txt) for yt-dlp on private/age-gated
      # Reels. The file lives on the HOST, OUTSIDE this git repo, so the secret
      # is never committed; it is bind-mounted read-only into the container.
      # `is_directory: false` is a Coolify hint (v4.1.2) that stops it from
      # creating a *file* bind-mount as a directory (coollabsio/coolify#8107).
      # To rotate the cookies: replace the host file, no redeploy needed.
      - type: bind
        source: /home/claudeuser/reelgram-secrets/ig_cookies.txt
        target: /secrets/ig_cookies.txt
        read_only: true
        is_directory: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  web:
    build: ./frontend
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      API_URL: /api
      ALLOW_SIGNUPS: ${ALLOW_SIGNUPS:-true}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80"          # Coolify maps the domain onto this service
    restart: unless-stopped
volumes:
  reelgram-media:
